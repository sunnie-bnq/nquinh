<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Love Universe 💙</title>
<link rel="icon" type="image/png" href="love.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

color:white;
overflow:hidden;

/* gradient layer */

background:linear-gradient(
-45deg,
#021B79,
#0575E6,
#1e3c72,
#2a5298
);

background-size:400% 400%;
animation:bgMove 14s infinite;

}

@keyframes bgMove{

0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}

}

/* GALAXY */

.stars{

position:fixed;
inset:0;

background:url("https://i.imgur.com/YKY28eT.png");

animation:moveStars 90s linear infinite;

opacity:.45;

pointer-events:none;

}

@keyframes moveStars{

from{background-position:0 0}
to{background-position:-8000px 4000px}

}

/* LIGHT MODE GALAXY */

.light .stars{
opacity:.25;
filter:brightness(1.5);
}

/* INTRO */

#intro{

position:fixed;
inset:0;

background:#081c3d;

display:flex;
justify-content:center;
align-items:center;

font-size:32px;
letter-spacing:3px;

z-index:999;

animation:fadeOut 3s forwards;
animation-delay:2s;

}

@keyframes fadeOut{

to{
opacity:0;
visibility:hidden;
}

}

/* LAYOUT */

.container{

display:grid;

grid-template-columns:220px 420px 220px;

align-items:center;

gap:40px;

padding:40px;

background:rgba(255,255,255,0.07);

backdrop-filter:blur(18px);

border-radius:28px;

box-shadow:
0 0 40px rgba(0,140,255,0.4);

animation:float 6s ease-in-out infinite;

}

@keyframes float{

0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}

}

/* PERSON */

.person{

text-align:center;

}

.avatar{

width:120px;
height:120px;

border-radius:50%;

object-fit:cover;

border:3px solid rgba(255,255,255,.8);

box-shadow:0 0 20px #00bfff;

transition:.4s;

}

.avatar:hover{

transform:scale(1.1);

box-shadow:0 0 30px #4fd3ff;

}

.name{

margin-top:10px;

font-weight:bold;

font-size:18px;

}

/* CENTER */

.center{

text-align:center;

}

.title{

font-size:26px;

margin-bottom:10px;

}

.counter{

font-size:34px;

font-weight:bold;

line-height:1.5;

margin:10px 0;

}

.extra{

opacity:.8;

}

/* HEART */

.heart{

font-size:34px;

animation:pulse 1.4s infinite;

}

@keyframes pulse{

0%{transform:scale(1)}
50%{transform:scale(1.35)}
100%{transform:scale(1)}

}

/* BUTTON */

button{

margin-top:10px;

border:none;

padding:10px 18px;

border-radius:20px;

background:#1e90ff;

color:white;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#3aa6ff;

transform:scale(1.05);

}

/* PARTICLES */

#particles{

position:fixed;

inset:0;

pointer-events:none;

}

.p{

position:absolute;

font-size:22px;

animation:fall linear forwards;

}

@keyframes fall{

from{
transform:translateY(-10vh) rotate(0deg);
opacity:1;
}

to{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}

}

/* HOTKEY PANEL */

#help{

position:fixed;

bottom:12px;
right:12px;

font-size:13px;

background:rgba(0,0,0,.35);

padding:10px;

border-radius:12px;

}

</style>
</head>

<body>

<div id="intro">💙 Loading Love Universe...</div>

<div class="stars"></div>

<div class="container">

<div class="person">

<img src="avt1.jpg" class="avatar">
<div class="name">sunnie ☀</div>

</div>

<div class="center">

<div class="title">Love Counter</div>

<div class="heart">💙</div>

<div id="counter" class="counter"></div>

<div id="extra" class="extra"></div>

<button onclick="toggleMusic()">🎵 Music</button>

<audio id="music" autoplay loop>
<source src="ido.mp3">
</audio>

</div>

<div class="person">

<img src="avt2.jpg" class="avatar">
<div class="name">jeru 🐢</div>

</div>

</div>

<div id="particles"></div>

<div id="help">

Space : Play/Pause<br>
F : Toggle particles<br>
D : Dark / Light<br>
H : Hide help<br>
T : Change theme<br>
R : Reload

</div>

<script>

const start=new Date("2026-02-09")

function update(){

let diff=new Date()-start

const days=Math.floor(diff/86400000)

diff%=86400000

const h=Math.floor(diff/3600000)
diff%=3600000

const m=Math.floor(diff/60000)
const s=Math.floor((diff%60000)/1000)

document.getElementById("counter").innerHTML=

days+" ngày<br>"+

String(h).padStart(2,"0")+":"+

String(m).padStart(2,"0")+":"+

String(s).padStart(2,"0")

document.getElementById("extra").innerHTML=

Math.floor(days/7)+" tuần • "+Math.floor(days/30)+" tháng"

}

setInterval(update,1000)

update()

/* MUSIC */

const music=document.getElementById("music")

function toggleMusic(){

if(music.paused){
music.play()
}else{
music.pause()
}

}

/* PARTICLES */

let particles=true

const icons=["💙","✨","❄️","🫧"]

function create(){

if(!particles)return

const p=document.createElement("div")

p.className="p"

p.innerText=icons[Math.floor(Math.random()*icons.length)]

p.style.left=Math.random()*100+"vw"

p.style.animationDuration=(5+Math.random()*5)+"s"

document.getElementById("particles").appendChild(p)

setTimeout(()=>p.remove(),10000)

}

setInterval(create,600)

/* HOTKEYS */

document.addEventListener("keydown",e=>{

if(e.code==="Space") toggleMusic()

if(e.key==="m") toggleMusic()

if(e.key==="f") particles=!particles

if(e.key==="d") document.body.classList.toggle("light")

if(e.key==="h"){

const help=document.getElementById("help")

help.style.display=help.style.display=="none"?"block":"none"

}

if(e.key==="t"){

const themes=[

"linear-gradient(-45deg,#021B79,#0575E6,#1e3c72,#2a5298)",

"linear-gradient(-45deg,#000428,#004e92)",

"linear-gradient(-45deg,#141e30,#243b55)"

]

document.body.style.background=

themes[Math.floor(Math.random()*themes.length)]

}

if(e.key==="r") location.reload()

})

</script>

</body>
</html>
